apiVersion: apps/v1
kind: Deployment
metadata:
  name: minikube-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minikube-app
  template:
    metadata:
      labels:
        app: minikube-app
    spec:
      containers:
      - name: minikube-app
        image: shakilahamed/minikube-app:latest
        ports:
        - containerPort: 7000
        env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-secret
              key: token
---
apiVersion: v1
kind: Service
metadata:
  name: minikube-app-service
spec:
  type: NodePort
  selector:
    app: minikube-app
  ports:
    - port: 7000        # Service port
      targetPort: 7000  # Pod container port
      nodePort: 30080   # External NodePort
