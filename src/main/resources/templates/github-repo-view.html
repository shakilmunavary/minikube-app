<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Repository: [[${repoName}]]</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <h1 class="mb-4">Welcome to EKS AI App</h1>
    <nav class="mb-4">
        <ul class="nav nav-pills">
            <li class="nav-item"><a class="nav-link" href="/add">Add User</a></li>
            <li class="nav-item"><a class="nav-link" href="/list">List User</a></li>
            <li class="nav-item"><a class="nav-link" href="/github/repos/view">GitHub Repos</a></li>
        </ul>
    </nav>

    <h2 class="mb-3">Repository Details</h2>

    <div class="card shadow-sm" style="max-width: 600px;">
        <div class="card-header bg-dark text-white">
            <h5 class="card-title mb-0" th:text="${repo.name}"></h5>
        </div>
        <div class="card-body">
            <p class="card-text">
                <strong>Full Name:</strong>
                <span th:text="${repo.fullName}"></span>
            </p>
            <p class="card-text">
                <strong>Description:</strong>
                <span th:text="${repo.description != null ? repo.description : 'No description available'}"></span>
            </p>
            <p class="card-text">
                <strong>Language:</strong>
                <span class="badge bg-info" th:text="${repo.language != null ? repo.language : 'N/A'}"></span>
            </p>
            <p class="card-text">
                <strong>⭐ Stars:</strong>
                <span th:text="${repo.stars}"></span>
            </p>
            <p class="card-text">
                <strong>🍴 Forks:</strong>
                <span th:text="${repo.forks}"></span>
            </p>
            <p class="card-text">
                <strong>🐛 Open Issues:</strong>
                <span th:text="${repo.openIssues}"></span>
            </p>
            <p class="card-text">
                <strong>Clone URL:</strong>
                <code th:text="${repo.cloneUrl}"></code>
            </p>
            <div class="mt-3">
                <a th:href="${repo.htmlUrl}" target="_blank" class="btn btn-primary">
                    View on GitHub
                </a>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a class="btn btn-secondary" href="/github/repos/view">← Back to Repositories</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
