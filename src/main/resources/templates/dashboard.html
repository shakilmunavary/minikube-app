<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Unified Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        section { margin-bottom: 40px; }
        h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 5px 0; }
        form { margin-bottom: 20px; }
        input { padding: 5px; margin-right: 10px; }
        button { padding: 5px 10px; }
    </style>
</head>
<body>
    <h1>Unified Dashboard</h1>

    <!-- User Section -->
    <section>
        <h2>Users</h2>
        <form th:action="@{/webapp/add}" method="post" th:object="${user}">
            <input type="text" th:field="*{name}" placeholder="Enter user name"/>
            <input type="email" th:field="*{email}" placeholder="Enter user email"/>
            <button type="submit">Add User</button>
        </form>

        <ul>
            <li th:each="u : ${users}">
                <span th:text="${u.name}"></span> - <span th:text="${u.email}"></span>
            </li>
        </ul>
    </section>

    <!-- GitHub Section -->
    <section>
        <h2>GitHub Repositories</h2>
        <ul>
            <li th:each="repo : ${repos}">
                <a th:href="@{/webapp/github/repo/view/{name}(name=${repo.name})}"
                   th:text="${repo.name}"></a>
            </li>
        </ul>
    </section>
</body>
</html>
