<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GitHub Repositories</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <h1 class="mb-4">Welcome to EKS AI App</h1>
    <nav class="mb-4">
        <ul class="nav nav-pills">
            <li class="nav-item"><a class="nav-link" href="/add">Add User</a></li>
            <li class="nav-item"><a class="nav-link" href="/list">List User</a></li>
            <li class="nav-item"><a class="nav-link active" href="/github/repos/view">GitHub Repos</a></li>
        </ul>
    </nav>

    <h2 class="mb-3">GitHub Repositories</h2>
    
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Repository</th>
                    <th>Description</th>
                    <th>Language</th>
                    <th>⭐ Stars</th>
                    <th>🍴 Forks</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="repo : ${repos}">
                    <td>
                        <a th:href="@{'/github/repo/view/' + ${repo.name}}" th:text="${repo.name}"></a>
                    </td>
                    <td th:text="${repo.description != null ? repo.description : 'No description'}"></td>
                    <td>
                        <span class="badge bg-secondary" th:text="${repo.language != null ? repo.language : 'N/A'}"></span>
                    </td>
                    <td th:text="${repo.stars}"></td>
                    <td th:text="${repo.forks}"></td>
                    <td>
                        <a th:href="${repo.htmlUrl}" target="_blank" class="btn btn-sm btn-outline-primary">
                            View on GitHub
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <p class="text-muted" th:text="'Total repositories: ' + ${repos.size()}"></p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
